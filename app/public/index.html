<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="loginView" class="min-vh-100 d-flex align-items-center justify-content-center auth-bg">
    <div class="card shadow-lg border-0 auth-card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="fw-bold mb-2">TaskFlow Manager</h1>
          <p class="text-muted mb-0">Inicia sesión para gestionar tus proyectos</p>
        </div>

        <div class="mb-3">
          <label for="username" class="form-label">Usuario</label>
          <input type="text" id="username" class="form-control" placeholder="admin">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="1234">
        </div>

        <button id="loginBtn" class="btn btn-primary w-100">Iniciar sesión</button>
        <p id="loginError" class="text-danger mt-3 mb-0 small"></p>

        <div class="alert alert-light mt-4 mb-0 small">
          <strong>Demo:</strong> usuario <code>admin</code> y contraseña <code>1234</code>
        </div>
      </div>
    </div>
  </section>

  <div id="appView" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">TaskFlow Manager</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="mainNavbar">
          <div class="d-flex flex-column flex-lg-row gap-2 ms-lg-auto align-items-lg-center">
            <button class="btn btn-outline-light filter-btn" data-filter="all">Todos</button>
            <button class="btn btn-outline-light filter-btn" data-filter="To Do">Por hacer</button>
            <button class="btn btn-outline-light filter-btn" data-filter="In Progress">En proceso</button>
            <button class="btn btn-outline-light filter-btn" data-filter="Completed">Completado</button>
            <button id="openFormBtn" class="btn btn-primary">Crear nuevo proyecto</button>
            <button id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </nav>

    <main class="py-4">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
          <div>
            <h2 class="fw-bold mb-1">Panel de proyectos</h2>
            <p class="text-muted mb-0">Crea, edita, filtra y administra tus tareas</p>
          </div>
        </div>

        <section id="projectFormWrapper" class="card border-0 shadow-sm mb-4 d-none">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h3 id="formTitle" class="h4 fw-bold mb-0">Crear nuevo proyecto</h3>
              <button id="cancelFormBtn" type="button" class="btn btn-outline-secondary btn-sm">
                Cerrar
              </button>
            </div>

            <form id="projectForm">
              <input type="hidden" id="projectId">

              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="projectName" class="form-label">Nombre del proyecto</label>
                  <input type="text" id="projectName" class="form-control" required>
                </div>

                <div class="col-12 col-md-6">
                  <label for="projectDeadline" class="form-label">Fecha límite</label>
                  <input type="date" id="projectDeadline" class="form-control" required>
                </div>

                <div class="col-12">
                  <label for="projectDescription" class="form-label">Descripción</label>
                  <textarea id="projectDescription" class="form-control" rows="3"></textarea>
                </div>

                <div class="col-12">
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0">Subtareas</label>
                    <button type="button" id="addSubtaskBtn" class="btn btn-outline-primary btn-sm">
                      Agregar subtarea
                    </button>
                  </div>
                  <div id="subtasksContainer" class="d-flex flex-column gap-2"></div>
                </div>
              </div>

              <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="button" id="cancelFormBtnSecondary" class="btn btn-outline-secondary">
                  Cancelar
                </button>
                <button type="submit" class="btn btn-primary">Guardar proyecto</button>
              </div>
            </form>
          </div>
        </section>

        <section class="row g-3 mb-4">
          <div class="col-12 col-sm-6 col-xl-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <p class="text-muted mb-1">Total</p>
                <h3 id="totalCount" class="fw-bold mb-0">0</h3>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-xl-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <p class="text-muted mb-1">Por hacer</p>
                <h3 id="todoCount" class="fw-bold mb-0">0</h3>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-xl-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <p class="text-muted mb-1">En proceso</p>
                <h3 id="progressCount" class="fw-bold mb-0">0</h3>
              </div>
            </div>
          </div>

          <div class="col-12 col-sm-6 col-xl-3">
            <div class="card stat-card border-0 shadow-sm">
              <div class="card-body">
                <p class="text-muted mb-1">Completados</p>
                <h3 id="completedCount" class="fw-bold mb-0">0</h3>
              </div>
            </div>
          </div>
        </section>

        <section>
          <div id="projectsContainer" class="row g-4"></div>
        </section>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener("click", (event) => {
      if (event.target && event.target.id === "cancelFormBtnSecondary") {
        const secondaryButton = document.getElementById("cancelFormBtnSecondary");
        const cancelButton = document.getElementById("cancelFormBtn");
        if (secondaryButton && cancelButton) {
          cancelButton.click();
        }
      }
    });
  </script>
  <script src="script.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
